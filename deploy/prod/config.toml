[http]
enabled = true
port = 8080
bind = "0.0.0.0"

# Explorer admin writes are allowed only from trusted networks.
# 100.64.0.0/10 covers Tailscale/VPN; 172.16.0.0/12 lets internal Docker
# services such as blockscout-importer call tidx without exposing writes publicly.
trusted_cidrs = ["100.64.0.0/10", "172.16.0.0/12"]
kaspa_explorer_base_url = "https://kaspa.stream"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "igra"
chain_id = 38833

# Igra L2 Ethereum-compatible JSON-RPC. This is the source for L2 blocks,
# transactions, receipts, logs, balances, and contract bytecode.
rpc_url = "https://rpc.igralabs.com:8545"
pg_url = "postgres://tidx@postgres:5432/tidx_igra"
pg_password_env = "POSTGRES_PASSWORD"
backfill = true
backfill_first = false
batch_size = 100
head_delay_blocks = 30
max_head_delay_blocks = 100
head_delay_window_secs = 600
concurrency = 6

# Keep false unless your devops team decides the RPC should be treated as authoritative.
trust_rpc = false

# Phase 4: index internal calls (debug_traceTransaction → internal_txs).
# Roughly doubles RPC volume on the realtime path; history was backfilled
# via the `tidx backfill-traces` CLI before this flag was flipped on.
enable_tracing = true

[chains.clickhouse]
# ClickHouse is part of the production stack. It powers Grafana dashboards,
# investigation queries, and larger analytical scans.
enabled = true
url = "http://clickhouse:8123"
database = "tidx_38833"

[chains.kaspa]
enabled = true

# Kaspa L1 Borsh wRPC is expected on the host at 127.0.0.1:17110.
# The kaspa-wrpc-proxy service exposes it to Docker as host.docker.internal:17111.
# This is used only for Kaspa provenance, not for L2 block indexing.
rpc_url = "ws://host.docker.internal:17111"
txid_prefix = "97b1"
poll_interval_ms = 1000
initial_tip_distance = 100
promotion_delay_secs = 43200
